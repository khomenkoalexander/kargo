---
# Bundled mode: starts Kafka (KRaft), topic init, and the backend.
# Copy .env.example to .env, set KFILE_BEARER_TOKEN, then: docker compose up -d
networks:
  kfile-network:
    driver: bridge


services:
  fix-permissions:
    image: alpine
    user: root
    volumes:
      - ./kafka-data:/data
    command: chown -R 1000:1000 /data
    restart: "no"
    
  fix-permissions-2:
    image: alpine
    user: root
    volumes:
      - ./kafka-init.sh:/kafka-init.sh
    command: chown -R 1000:1000 /kafka-init.sh
    restart: "no"

  kafka:
    image: apache/kafka:latest
    container_name: kafkafile-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka.storage.internals.log.LocalLog=WARN,org.apache.kafka.storage.internals.log.ProducerStateManager=WARN"
    volumes:
      - ${KFILE_KAFKA_DATA:-./kafka-data}:/var/lib/kafka/data
    networks:
      - kfile-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka-init:
    image: apache/kafka:latest
    container_name: kafkafile-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KFILE_KAFKA_BOOTSTRAP: kafka:9092
      KFILE_INFO_TOPIC: ${KFILE_INFO_TOPIC:-xfer.info}
      KFILE_DATA_TOPIC: ${KFILE_DATA_TOPIC:-xfer.data}
      KFILE_DATA_PARTITIONS: ${KFILE_DATA_PARTITIONS:-6}
    volumes:
      - ./kafka-init.sh:/kafka-init.sh:ro
    networks:
      - kfile-network
    entrypoint: ["/bin/bash", "/kafka-init.sh"]
    restart: "no"

  backend:
    image: kafkafile-backend
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: kafkafile-backend
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${KFILE_BACKEND_PORT:-8080}:8080"
    environment:
      KFILE_BEARER_TOKEN: ${KFILE_BEARER_TOKEN:?KFILE_BEARER_TOKEN is required}
      KFILE_KAFKA_BOOTSTRAP: kafka:9092
      KFILE_BACKEND_PORT: ${KFILE_BACKEND_PORT:-8080}
      KFILE_INFO_TOPIC: ${KFILE_INFO_TOPIC:-xfer.info}
      KFILE_DATA_TOPIC: ${KFILE_DATA_TOPIC:-xfer.data}
      KFILE_DATA_PARTITIONS: ${KFILE_DATA_PARTITIONS:-6}
      KFILE_WINDOW: ${KFILE_WINDOW:-10}
      KFILE_MAX_CHUNK_BYTES: ${KFILE_MAX_CHUNK_BYTES:-4194304}
      KFILE_TTL_OFFER: ${KFILE_TTL_OFFER:-1800}
      KFILE_TTL_TRANSFER: ${KFILE_TTL_TRANSFER:-3600}
      KFILE_TTL_ORPHAN: ${KFILE_TTL_ORPHAN:-60}
    networks:
      - kfile-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
